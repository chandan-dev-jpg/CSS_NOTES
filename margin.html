<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      section {
        width: 600px;
        height: 400px;
        background-color: black;
        color: white;
        font-size: 32px;
        /* ? -- margin : space outside the container --- */
        margin-top: 200px;
        margin-right: 400px;
        margin-bottom: 200px;
        margin-left: 400px;
        /* margin: top right bottom left ; */
        margin: 20px 30px 20px 30px;
        /* ? if u have margin right and left with same values As well as margin top & bottom with same values u can use one shorthand syntax that is margin with 2 values  */

        /* margin: top/bottom left/right; */
        margin: 50px 40px;

        /* ? if u have same values in all 4 sides u can use the shorthand syntax with single value  */
        margin: 30px;
        margin: 40px;
      }
    </style>
  </head>
  <body>
    <section>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Inventore,
        iste.
      </p>
    </section>
  </body>
</html>
