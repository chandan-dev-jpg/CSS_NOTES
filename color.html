<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        color: lightblue;
        color: darkblue;
        color: red;
        color: rgb(r g b);
        color: rgb(256, 0, 0);
        color: rgb(0, 256, 0);
        color: rgb(0, 0, 256);
        color: rgb(200, 56, 26);
        color: #874d00;
        /* # 0-9 & a to f */
        /* #red red green green blue blue */
        /* # red green blue : if both the values of red , green as well as blue are same  */
        /* 
         color: #8899ff;
        color: #89f;
        */
        /* ! -------------------- */
        /* #red red green green blue blue alpha alpha */
        /* # red green blue alpha : if both the values of red , green, blue as well as alpha are same  */
        /*  
          color: #880055ff;
        color: #805f;
        */

        color: hwb(0 0% 0%);
        color: #00ff00;
        color: #0000ff;
        color: #8899ff;
        color: #89f;

        color: hwb(0 0% 0%);
        color: #880055ff;
        color: #805f;

        background-color: #fff;
        background-color: #000;
      }

      /*
        ! ways to pass the color property value
        1. color name
         >> light & dark and normal

        2. rgb: red green blue
        3. hsl 
        4. rgba 
        5. hsla
        6. hex values 
        7. hex values with alpha 
        
        



        values of
        1. text
        2. font
        3. color  - text
        4. margin
        5. padding
        6. gap b/w the content
        7. bg - color & gradient


        */
    </style>
  </head>
  <body>
    <p>color topic</p>
  </body>
</html>
