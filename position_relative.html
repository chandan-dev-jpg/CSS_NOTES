<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *
        {
            margin:0;padding:0;
            box-sizing:border-box;
        }
         html,
      body,
      #mainWrapper {
        height: 100%;
        width: 100%;
        background-color: skyblue;
      }
      header {
        width: 80%;
        height: 10%;
        /* font-size:20px; */
        background-color: black;
        margin: auto;
        margin-top: 30px;
        border-radius: 50px;

        position: sticky;
        top: 20px;
      }
      #goToTop
      {
        font-size:40px;
width:15vw;
height:15vh;
text-align:center;
border-radius: 50%;
border:2px solid red;
position: fixed;
bottom: 10px;
padding-top:20px;

      }
       .heroSection {
        width: 100%;
        height: 100%;
        background-color: silver;
        padding: 40px 0px 0px 20px;
        margin-top: 30px;
      }
      .parent {
        width: 80%;
        height: 80%;
        background-color: seashell;
      }
      .child1,
      .child2,
      .child3 {
        width: 30%;
        height: 30%;
        border: solid;
        font-size: 10vw;
      }

      .child1 {
        background-color: skyblue;
        position: relative;
        left: 400px;
      }
      .child2 {
        position: relative;
        top: 300px;
        background-color: red;
      }
      .child3 {
        position: relative;
        left: 500px;
        background-color: seagreen;
      }
    </style>
</head>
<body>
     <section id="mainWrapper">
      <header></header>
      <p id="goToTop">🔝</p>
      <section class="heroSection">
        <div class="parent">
          <div class="child1">1</div>
          <div class="child2">2</div>
          <div class="child3">3</div>
        </div>
      </section>
    </section>
</body>
</html>
