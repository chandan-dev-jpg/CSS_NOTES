
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .mainDoor {
        width: 200px;
        height: 300px;
        background-color: red;
        /* ! ----------- */
        /* border: width style colorName; */
        border: 10px solid black;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        border-bottom-right-radius: 20px;
        border-bottom-left-radius: 20px;

        /* border-radius : top-left top-right bottom-right bottom-left */
        border-radius: 20px 100px 400px 0px;

        /* border-radius: top-left/ bottom-right top-right/ bottom-left corners; */
        border-radius: 40px 260px;

        /* border-radius: top-left/ bottom-right top-right/ bottom-left bottom-right; */
        border-radius: 40px 260px 0px;

        border-radius: 0px 500px 0px 500px;
        border-radius: 0px 500px;
        border-radius: 500px 0px;

        border-radius: 150px 150px 0px 0px;
      }

      .nestedDoor,
      .nestedChildDoor,
      .nestedNestedChildDoor,
      .lastDoor {
        width: 80%;
        height: 80%;
        background: white;
        border: 7px double black;
        border-radius: 150px 150px 0px 0px;
        margin: auto;
        margin-top: 10%;
      }

      /* .nestedNestedChildDoor,
      .nestedDoor {
        background-color: black;
      } */
    </style>
  </head>
  <body>
    <section class="mainDoor">
      <section class="nestedDoor">
        <section class="nestedDoor">
          <section class="nestedDoor">
            <div class="nestedDoor">
              <div class="nestedDoor">
                <div class="nestedDoor">
                  <div class="nestedDoor">
                    <div class="nestedDoor"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </section>
      </section>
    </section>
  </body>
</html>
