<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        /* text transform - anyCase to  lowerCase, upperCase and capitalize */
        text-transform: lowercase;
        text-transform: uppercase;
        text-transform: capitalize;
        text-transform: none;

        /* text alignment : left/start , right/end & center & justify { manage the space b/w the line or the row }   */
        text-align: right;
        text-align: left;
        text-align: end;
        text-align: start;
        text-align: center;

        /* ? how to manage the space in the line or row of the text such as, in the paragraph  */
        /* text-align: justify aligns text evenly along both the left and right margins. */
        text-align: justify;

        /* ! ------------------------------- */
        /* ? text decoration :  */
        text-decoration: underline;
        text-decoration: overline;
        text-decoration: line-through;
        text-decoration: none;

        /* ? ---- modify text decoration ------- */
        text-decoration-color: red;
        text-decoration-thickness: 2px;

        /* ! ======== text-indent : add the space in the starting of the text  ================ */

        /* todo : fixed space */
        text-indent: 200px;
        /* todo : dependable space on parent  */
        text-indent: 70%;

        /* text-shadow: x-axis y-axis blurAmount colorName; */
        /* ! no shadow */

        text-shadow: 0px 0px 0px red;
        /* ! +ve x-axis solid shadow */
        text-shadow: 2px 0px 0px red;
        /* ! +ve x-axis blur shadow */
        text-shadow: 2px 0px 1px red;

        /* ! -ve x-axis blur shadow */
        text-shadow: -2px 0px 1px red;
        /* ! 0,0 - adds the glow / outline  */
        text-shadow: 0px 0px 1px white;
        /* text-shadow: 0px 0px 1px red; */
        text-shadow: none;

        /* ! ---------------- */
        text-shadow: 0px 2px 1px red;
        text-shadow: 0px -2px 1px red;
        text-shadow: 1px -7px 2px rgba(255, 4, 4, 1);
        text-shadow:
          0 -1px 4px #fff,
          0 -2px 10px #ff0,
          0 -10px 20px #ff8000,
          0 -18px 40px #f00;
        text-shadow: none;

        text-align: left;

        letter-spacing: 0px;
        letter-spacing: 4px;
        word-spacing:0px;
        word-spacing:100px;

         /* ? over lapping : 0/p = 1 single line  */
        /* line-height: 0px;
        line-height: 30px; */

        /* ! font property : 
        
        */
        font-size: 200px;
        /* font-size: 20vw; */
        font-style: italic;
        font-style: normal;
        font-family: serif;
        font-family: sans-serif;
        /* font-family: monospace;
        font-family: cursive; */
        font-family: Georgia, "Times New Roman", Times, serif;
        font-weight: 100;
        font-weight: 200;
        font-weight: 300;
        font-weight: 400;
        font-weight: 500;
        font-weight: 600;
        font-weight: 700;
        font-weight: 800;
        font-weight: 900;
        font-weight: bold;
        font-weight: bolder;
        font-weight: lighter;
        font-weight: normal;
      }
    </style>
  </head>
  <body>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam quaerat,
      voluptatum fugit suscipit maiores dignissimos pariatur dolorum eveniet ex
      harum!
    </p>
  </body>
</html>
