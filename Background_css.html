<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      section {
        width: 600px;
        height: 200px;
        background-color: gainsboro;
        background-image: url(image.png);
        /* 
        ?  background-size : with the help of this we can specify or change the size of an image that is bg image not the section height and width for the section we have height and width properties 
        */
        /* contain : it keep the full size image as it is */
        background-size: contain;
        /* cover : it try to cover the 100% size of the section */
        /* background-size: cover; */
        background-position: bottom;
        background-position: top;
        background-position: center;
        background-position: left left;
        background-position: 20% 100%;

        background-repeat: repeat;
        background-repeat: repeat-x;
        background-repeat: repeat-y;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <section></section>
  </body>
</html>
