<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      section {
        width: 100px;
        height: 100px;
        background-color: silver;
        /* ? border : line or space b/w the margin & padding  */
        border-top-width: 3px;
        border-top-color: red;
        border-top-style: solid;

        border-right-width: 3px;
        border-right-color: red;
        border-right-style: solid;

        border-right-width: 3px;
        border-right-color: rgb(16, 7, 7);
        border-right-style: solid;

        border-bottom-width: 3px;
        border-bottom-color: red;
        border-bottom-style: solid;

        border-left-width: 3px;
        border-left-color: rgb(16, 7, 7);
        border-left-style: solid;
        border-style: dotted;

        /* border: width style colorName;  */
        border: 2px solid gold;
        border: 20px double;
        border: dotted;

        /* ! style values in border  */
        border: 15px solid black;
        border-style: solid;
        border-style: double;
        border-style: dotted;
        border-style: dashed;
        border-style: ridge;
        border-style: groove;
        border-style: inset;
        border-style: outset;
        /* border-style: hidden; */

        border-width: 1px;
        border-width: 2px;
        border-width: 10px;
        border-width: 20px;
        border-width: 22px;
        border-width: 29px;
        border-width: 30px;
        border-width: 32px;
        border-width: 34px;
        border-width: 39px;
        border-width: 40px;
        border-width: 50px;
        border-width: 60px;
      }
    </style>
  </head>
  <body>
    <section></section>
  </body>
</html>
