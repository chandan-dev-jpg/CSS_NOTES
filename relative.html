      /* ! boiler plate code of the css  */
      * {
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        background-color: purple;

      #mainWrapper {
        width: 50%;
        height: 50%;

      .parent {

        height: 100%;
        background-color: skyblue
      }
      .child {
        width: 80%;
        height: 60%;

            50% of 100vh 
            50%{nested child } 50% {child} of 
            100% {parent} of 100vw {screen / vw - body }
            */
        /* background-color: rgb(143, 196, 243); */
      }

      .nestedChild {
        width: 50%;
        height: 50%;
        /* background-color: saddlebrown; */
      }
    </style>
  </head>
  <body>
    <main id="mainWrapper">
      <section class="parent">
        <section class="child">
          <section class="nestedChild"></section>
        </section>
      </section>
    </main>
  </body>
